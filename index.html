<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro LOAK</title>

<style>
:root {
  --primary-color: #001f3f;
  --secondary-color: #ffffff;
  --input-border: #007BFF;
  --accent-color: #007BFF;
  --danger-color: #ff4d4d;
  --success-color: #28a745;
  --warning-color: #ffc107;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--secondary-color);
  color: var(--primary-color);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* --- LOGIN --- */
#loginPage {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  flex: 1;
  text-align: center;
  padding: 20px;
}

#loginPage h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 5px; }

#loginPage input {
  padding: 12px;
  margin: 10px 0;
  width: 260px;
  border-radius: 10px;
  border: 2px solid var(--input-border);
  outline: none;
}

#loginButtons { display: flex; gap: 10px; margin-top: 10px; }

.btn-login {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background-color: var(--primary-color);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

/* --- MENU LATERAL --- */
#menu {
  position: fixed;
  top: 0;
  left: -320px;
  width: 320px;
  height: 100%;
  background-color: var(--primary-color);
  color: white;
  padding: 20px;
  transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  z-index: 900;
  box-sizing: border-box;
}

#menu.active { left: 0; }

#searchBar {
  width: 100%;
  padding: 10px;
  margin-top: 60px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.2);
  color: white;
  outline: none;
}

#menuList { margin-top: 10px; list-style: none; padding: 0; }

.folder-header {
  cursor: pointer;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  margin-top: 5px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

.folder-content {
  display: none;
  padding-left: 10px;
  margin-bottom: 10px;
}

.folder-content.show { display: block; }

#menuList li {
  padding: 12px;
  background: rgba(255,255,255,0.05);
  margin-top: 8px;
  border-radius: 10px;
  position: relative;
  list-style: none;
}

.date-amount { font-weight: bold; display: block; font-size: 0.9rem; }
.reason { font-size: 0.8rem; opacity: 0.7; display: block; margin-top: 4px; }
.deleteBtn {
  background: none; border: none; color: var(--danger-color);
  cursor: pointer; position: absolute; right: 10px; top: 12px; font-size: 1.2rem;
}

/* --- INTERFACE PRINCIPAL --- */
#main {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

#welcomeUser { font-size: 1.2rem; opacity: 0.8; }

#total {
  font-size: 3.5rem;
  margin: 20px 0;
  font-weight: bold;
  border-bottom: 4px solid var(--primary-color);
  padding-bottom: 5px;
}

/* --- BOTÕES FLUTUANTES --- */
#actionContainer {
  display: flex;
  gap: 25px;
  margin-top: 30px;
  align-items: flex-end;
}

.fab-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.actionBtn {
  background-color: var(--primary-color);
  color: white;
  border: none;
  width: 70px;
  height: 70px;
  border-radius: 20px;
  font-size: 28px;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}

.sub-buttons {
  position: absolute;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  transform: translateY(20px);
}

.sub-buttons.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

.mini-btn {
  width: 50px;
  height: 50px;
  border-radius: 15px;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.btn-export { background-color: var(--success-color); }
.btn-import { background-color: var(--warning-color); }

.btn-label {
    position: absolute;
    right: 60px;
    background: #333;
    color: white;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    white-space: nowrap;
}

#menuButton {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: var(--primary-color);
  color: white;
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 15px;
  font-size: 24px;
  cursor: pointer;
  z-index: 1000;
}

#addForm {
  display: none;
  position: fixed;
  bottom: 120px;
  background-color: white;
  border: 1px solid #ddd;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 1001;
}

#addForm input, #addForm select {
  display: block;
  margin: 12px 0;
  padding: 12px;
  width: 240px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#submitButton {
  width: 100%;
  padding: 12px;
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>
<body>

<div id="loginPage">
  <h1>LOAK</h1>
  <input type="text" id="usernameInput" placeholder="Usuário">
  <input type="password" id="passwordInput" placeholder="Senha">
  <div id="loginButtons">
    <button id="loginButton" class="btn-login">ENTRAR</button>
    <button id="createButton" class="btn-login" style="background:#666">CRIAR CONTA</button>
  </div>
</div>

<div id="main">
  <button id="menuButton">☰</button>
  <div id="welcomeUser"></div>
  <div id="total">$ 0,00</div>

  <div id="actionContainer">
      <button id="addButton" class="actionBtn">+</button>

      <div class="fab-wrapper">
          <div id="playOptions" class="sub-buttons">
              <button class="mini-btn btn-export" onclick="exportarDados()" title="Exportar Backup">
                <span class="btn-label">Exportar</span> ↓
              </button>
              <button class="mini-btn btn-import" onclick="triggerImport()" title="Importar Backup">
                <span class="btn-label">Importar</span> ↑
              </button>
          </div>
          <button id="playButton" class="actionBtn">▶️</button>
      </div>
  </div>
</div>

<div id="menu">
  <input type="text" id="searchBar" placeholder="🔍 Pesquisar dia, mês ou motivo..." onkeyup="atualizarHistorico()">
  <div id="menuList"></div>
</div>

<div id="addForm">
  <h3 style="margin:0 0 15px 0">Novo Registro</h3>
  <input type="date" id="dateInput">
  <input type="number" id="amountInput" placeholder="Valor (0.00)">
  <input type="text" id="reasonInput" placeholder="Motivo/Descrição">
  <select id="typeInput">
    <option value="income">Ganho (+)</option>
    <option value="expense">Gasto (-)</option>
  </select>
  <select id="paymentInput" style="display:none;">
    <option value="pix">Pix</option>
    <option value="cartao_credito">Cartão de Crédito</option>
    <option value="cartao_debito">Cartão de Débito</option>
  </select>
  <button id="submitButton">SALVAR</button>
</div>

<input type="file" id="importFileInput" style="display: none;" accept=".json">

<script>
let total = 0;
let records = [];
let currentUser = "";
let menuOpen = false;

const mesesNomes = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

const loginPage = document.getElementById('loginPage');
const main = document.getElementById('main');
const totalDisplay = document.getElementById('total');
const welcomeUser = document.getElementById('welcomeUser');
const playOptions = document.getElementById('playOptions');
const addForm = document.getElementById('addForm');
const importFileInput = document.getElementById('importFileInput');

// --- LOGIN ---
document.getElementById('loginButton').onclick = () => {
    const user = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    const stored = localStorage.getItem(`user_${user}`);
    
    if(!stored) return alert("Usuário não cadastrado!");
    const userData = JSON.parse(stored);
    
    if(userData.password === pass) {
        currentUser = user;
        records = userData.records || [];
        loginPage.style.display = 'none';
        main.style.display = 'flex';
        welcomeUser.textContent = `BEM-VINDO, ${currentUser.toUpperCase()}`;
        salvarESincronizar();
    } else {
        alert("Senha incorreta!");
    }
};

document.getElementById('createButton').onclick = () => {
    const user = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    if(!user || !pass) return alert("Preencha os campos!");
    if(localStorage.getItem(`user_${user}`)) return alert("Usuário já existe!");
    localStorage.setItem(`user_${user}`, JSON.stringify({password: pass, records: []}));
    alert("Conta criada!");
};

// --- INTERAÇÕES ---
document.getElementById('menuButton').onclick = () => {
    menuOpen = !menuOpen;
    document.getElementById('menu').classList.toggle("active");
    document.getElementById('menuButton').textContent = menuOpen ? "✖" : "☰";
    if(menuOpen) atualizarHistorico();
};

document.getElementById('addButton').onclick = () => {
    addForm.style.display = addForm.style.display === 'block' ? 'none' : 'block';
};

document.getElementById('playButton').onclick = (e) => {
    e.stopPropagation();
    playOptions.classList.toggle('active');
};

document.addEventListener('click', () => {
    playOptions.classList.remove('active');
});

document.getElementById('typeInput').onchange = (e) => {
    document.getElementById('paymentInput').style.display = e.target.value === 'expense' ? 'block' : 'none';
};

// --- SALVAR REGISTRO ---
document.getElementById('submitButton').onclick = () => {
    const date = document.getElementById('dateInput').value;
    const amount = parseFloat(document.getElementById('amountInput').value);
    const reason = document.getElementById('reasonInput').value;
    const type = document.getElementById('typeInput').value;
    const payment = type === 'expense' ? document.getElementById('paymentInput').value : "";

    if(!date || isNaN(amount)) return alert("Preencha os campos obrigatórios!");

    const newRecord = { 
        date, amount, reason, type, payment, 
        id: Date.now() + Math.random().toString(36).substr(2, 5) 
    };
    
    records.push(newRecord);
    salvarESincronizar();
    addForm.style.display = 'none';
    limparCampos();
};

function limparCampos() {
    document.getElementById('amountInput').value = "";
    document.getElementById('reasonInput').value = "";
}

// --- EXPORTAR / IMPORTAR ---
function exportarDados() {
    const dataStr = JSON.stringify(records);
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    const link = document.createElement('a');
    link.setAttribute('href', dataUri);
    link.setAttribute('download', `loak_backup_${currentUser}.json`);
    link.click();
}

function triggerImport() {
    importFileInput.click();
}

importFileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const imported = JSON.parse(event.target.result);
            imported.forEach(imp => {
                if (!records.some(r => r.id === imp.id)) records.push(imp);
            });
            records.sort((a,b) => new Date(a.date) - new Date(b.date));
            salvarESincronizar();
            alert("Sincronizado!");
        } catch(err) { alert("Arquivo inválido!"); }
    };
    reader.readAsText(file);
    importFileInput.value = "";
};

// --- ATUALIZAÇÃO E BUSCA INTELIGENTE ---
function salvarESincronizar() {
    const userData = JSON.parse(localStorage.getItem(`user_${currentUser}`));
    userData.records = records;
    localStorage.setItem(`user_${currentUser}`, JSON.stringify(userData));
    recalcularTotal();
    atualizarHistorico();
}

function recalcularTotal() {
    total = records.reduce((acc, r) => r.type === 'income' ? acc + r.amount : acc - r.amount, 0);
    totalDisplay.textContent = `$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    totalDisplay.style.color = total < 0 ? "var(--danger-color)" : "var(--primary-color)";
}

function atualizarHistorico() {
    const menuList = document.getElementById('menuList');
    const search = document.getElementById('searchBar').value.toLowerCase();
    menuList.innerHTML = '';
    
    const filtered = records.filter(r => {
        const [year, month, day] = r.date.split('-');
        const nomeMes = mesesNomes[parseInt(month) - 1];
        const dataFormatada = `${day}/${month}/${year}`;
        
        return r.reason.toLowerCase().includes(search) || 
               dataFormatada.includes(search) || 
               nomeMes.includes(search) ||
               r.date.includes(search);
    });

    const grouped = {};
    filtered.forEach(r => {
        const [year, month] = r.date.split('-');
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = [];
        grouped[year][month].push(r);
    });

    Object.keys(grouped).sort((a,b) => b-a).forEach(year => {
        const yearHeader = document.createElement('div');
        yearHeader.className = 'folder-header';
        yearHeader.innerHTML = `<span>📂 ${year}</span> <span>▼</span>`;
        
        const yearContent = document.createElement('div');
        yearContent.className = search !== "" ? 'folder-content show' : 'folder-content';
        yearHeader.onclick = () => yearContent.classList.toggle('show');

        Object.keys(grouped[year]).sort((a,b) => b-a).forEach(month => {
            const monthHeader = document.createElement('div');
            monthHeader.className = 'folder-header';
            monthHeader.style.fontSize = '0.9rem';
            monthHeader.style.background = 'rgba(255,255,255,0.05)';
            const nomeMesDisplay = mesesNomes[parseInt(month) - 1];
            monthHeader.innerHTML = `<span>📅 ${nomeMesDisplay.toUpperCase()}</span> <span>▼</span>`;
            
            const monthContent = document.createElement('div');
            monthContent.className = search !== "" ? 'folder-content show' : 'folder-content';
            monthHeader.onclick = (e) => {
                e.stopPropagation();
                monthContent.classList.toggle('show');
            };

            grouped[year][month].forEach(r => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="date-amount" style="color:${r.type === 'income' ? '#28a745':'#ff4d4d'}">
                        ${r.date.split('-').reverse().join('/')} — $ ${r.amount.toFixed(2)}
                    </span>
                    <span class="reason">${r.reason || 'Sem descrição'} ${r.payment ? '('+r.payment.toUpperCase()+')' : ''}</span>
                    <button class="deleteBtn" onclick="deletar('${r.id}')">🗑</button>
                `;
                monthContent.appendChild(li);
            });
            yearContent.appendChild(monthHeader);
            yearContent.appendChild(monthContent);
        });
        menuList.appendChild(yearHeader);
        menuList.appendChild(yearContent);
    });
}

function deletar(id) {
    if(confirm("Excluir registro?")) {
        records = records.filter(r => r.id !== id);
        salvarESincronizar();
    }
}

document.getElementById('dateInput').valueAsDate = new Date();
</script>
</body>
</html>
